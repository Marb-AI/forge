name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false   # zero dependencies — nothing to cache (no go.sum)

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: test
        run: go test -race -coverprofile=coverage.out ./...

      - name: coverage total
        run: go tool cover -func=coverage.out | tail -1

      - name: cross-compile all platforms
        run: |
          set -e
          for t in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64 windows/amd64 windows/arm64; do
            echo "client $t"
            GOOS=${t%/*} GOARCH=${t#*/} go build -o /dev/null ./cmd/forge
          done
          for a in amd64 arm64; do
            echo "agent linux/$a"
            GOOS=linux GOARCH=$a go build -o /dev/null ./cmd/forge-agent
          done
