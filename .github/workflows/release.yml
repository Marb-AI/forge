name: Release

# Push a tag like v0.1.1 and this builds every binary and publishes the release.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release binaries
        run: make release   # embeds the linux agent, builds macOS/Linux/Windows (amd64+arm64)

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" ./dist/* \
            --title "forge $GITHUB_REF_NAME" \
            --generate-notes
