name: Release

# Push a tag like v0.1.1 and this builds every binary and publishes the release.
# Runs on macOS so the darwin binaries can be code-signed — an unsigned/
# linker-signed cross-compiled binary is killed by Apple Silicon's AMFI
# ("killed: 9"). macOS runners are free for public repos.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Build release binaries
        run: make release   # embeds the linux agent; darwin built natively, linux/windows cross-compiled

      - name: Ad-hoc sign macOS binaries
        run: |
          for b in dist/forge-darwin-amd64 dist/forge-darwin-arm64; do
            codesign --force --sign - "$b"
            codesign -dv "$b" 2>&1 | grep -i 'Signature' || true
          done

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" ./dist/* \
            --title "forge $GITHUB_REF_NAME" \
            --generate-notes
